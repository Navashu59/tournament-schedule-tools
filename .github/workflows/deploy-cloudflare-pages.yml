name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_DOMAIN: tournamentscheduletools.org
      SITE_ORIGIN: https://tournamentscheduletools.org
      CLOUDFLARE_PAGES_PROJECT: tournament-schedule-tools
      GSC_VERIFY_TXT: google-site-verification=-6WfSeGbMeqKJNfVdbpalV1o8abb8MtdFtS_XNyUe-E
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm run build

      - name: Create Pages project
        run: npx wrangler pages project create "$CLOUDFLARE_PAGES_PROJECT" --production-branch main || true

      - name: Deploy Pages
        run: npx wrangler pages deploy public --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch main --commit-hash "$GITHUB_SHA"

      - name: Configure DNS and custom domains
        run: node scripts/cloudflare-postdeploy.js
